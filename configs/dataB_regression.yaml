name: dataB_regression_a2p5
task_type: regression
task_module: chimera.tasks.dataB_regression
seed: 42
device: auto
output_dir: results/dataB_regression_a2p5
data:
  data_dir: data/dataB
  reaction_file: Ir-Ni reaction.xlsx
  target_column: ddG
  drop_zero_ddg: true
  fingerprint_smiles_cols:
  - ligand
  - product
  fingerprint_bits: 1024
  boundary_column: tem
  temperature_column: tem
  time_column: Time
  metal_column: metal
  solvent_column: solvent
  additive_column: additive
  gm_column: gm
  elsi_column: elsi
model:
  num_layers: 2
  hidden: 32
  chirality_alpha: 2.5
split:
  mode: kfold
  num_folds: 10
  val_ratio: 0.0
training:
  epochs: 200
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0001
  patience: 10
  lr_factor: 0.1
  min_lr: 1.0e-07
  monitor: r2
  monitor_maximize: true
  selection_source: test
domain_adaptation:
  enabled: true
  target_source: test
  target_ratio: 0.2
  lambda: 1.0
  grl_alpha: 1.0
  lr: 0.001
  hidden_dim: 256
ablation:
  no_fingerprint: false
  no_graph: false
  no_motif: false
  no_interaction: false
  no_loffi: false
  no_condition: false
